  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --card: #141414;
      --gold: #C9A84C;
      --gold2: #e8c96a;
      --text1: #f0f0f0;
      --text2: #999;
      --radius: 16px;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1px solid #2a2a2a;
      border-radius: var(--radius);
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.2rem;
      animation: pop .5s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: .8rem;
    }

    p {
      color: var(--text2);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .order-info {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 1.2rem 1.5rem;
      text-align: right;
      margin-bottom: 2rem;
      font-size: .95rem;
      line-height: 2;
      border: 1px solid #252525;
    }

    .order-info strong {
      color: var(--gold2);
    }

    .btn-home {
      display: inline-block;
      background: var(--gold);
      color: #000;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: .85rem 2.5rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .15s;
    }

    .btn-home:hover {
      background: var(--gold2);
      transform: translateY(-2px);
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 2.5rem;
      letter-spacing: .05em;
    }
  </style>
</head>
<body>

  <div class="logo">✦ متجري</div>

  <div class="card">
    <div class="icon">🎉</div>
    <h1>شكراً لك عزيزي العميل!</h1>
    <p>تم استلام طلبيتك بنجاح.<br/>سيتصل بك فريقنا في أسرع وقت ممكن لتأكيد الطلب.</p>

    <div class="order-info" id="order-info">
      <!-- تُملأ ديناميكياً من URL params -->
    </div>

    <a href="index.html" class="btn-home">🏠 العودة للرئيسية</a>
  </div>

  <script>
    // ─── قراءة بيانات الطلب من URL params ───
    const params = new URLSearchParams(window.location.search);
    const fname    = params.get('fname') || '';
    const lname    = params.get('lname') || '';
    const phone    = params.get('phone') || '';
    const wilaya   = params.get('wilaya') || '';
    const baladia  = params.get('baladia') || '';
    const delivery = params.get('delivery') || '';
    const address  = params.get('address') || '';
    const qty      = params.get('qty') || '1';
    const total    = params.get('total') || '';
    const value    = parseInt(params.get('value') || '5490');
    const isHome   = delivery === 'توصيل للمنزل';

    // ─── عرض بيانات الطلب ───
    const info = document.getElementById('order-info');
    info.innerHTML = `
      <strong>الاسم:</strong> ${fname} ${lname}<br/>
      <strong>الهاتف:</strong> ${phone}<br/>
      <strong>الولاية:</strong> ${wilaya}<br/>
      <strong>البلدية:</strong> ${baladia}<br/>
      <strong>طريقة التوصيل:</strong> ${delivery}<br/>
      ${isHome && address ? `<strong>العنوان:</strong> ${address}<br/>` : ''}
      <strong>الكمية:</strong> ${qty} — <strong>المجموع:</strong> ${total}
    `;

    // ─── تتبع Meta Pixel — Purchase ───
    if (typeof fbq !== 'undefined') {
      fbq('track', 'Purchase', {
        value: value,
        currency: 'DZD',
        num_items: parseInt(qty)
      });
    }

    // ─── تتبع TikTok Pixel — PlaceAnOrder ───
    if (typeof ttq !== 'undefined') {
      ttq.track('PlaceAnOrder', {
        value: value,
        currency: 'DZD',
        quantity: parseInt(qty)
      });
    }
  </script>

</body>
</html>
